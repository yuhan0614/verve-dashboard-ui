<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verve_New 成效儀表板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; font-size: 14px; }

  .header { background: linear-gradient(135deg, #52c41a 0%, #389e0d 100%); color: white; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-badge { background: rgba(255,255,255,0.2); border-radius: 8px; padding: 6px 14px; font-size: 13px; font-weight: 600; }
  .header-title h1 { font-size: 20px; font-weight: 700; }
  .header-title p { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  .header-right { font-size: 12px; opacity: 0.85; text-align: right; line-height: 1.7; }
  a.back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(255,255,255,0.85); text-decoration: none; }
  a.back-link:hover { color: white; }

  .controls { background: white; border-bottom: 1px solid #e4e6ea; padding: 12px 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .preset-btns { display: flex; gap: 6px; }
  .preset-btn { padding: 5px 14px; border: 1.5px solid #e4e6ea; border-radius: 20px; background: white; font-size: 12px; cursor: pointer; color: #555; transition: all 0.15s; font-weight: 500; }
  .preset-btn:hover { background: #f6ffed; border-color: #52c41a; color: #52c41a; }
  .preset-btn.active { background: #52c41a; color: white; border-color: #52c41a; }
  .date-inputs { display: flex; align-items: center; gap: 6px; }
  .date-inputs input { padding: 5px 10px; border: 1.5px solid #e4e6ea; border-radius: 8px; font-size: 12px; outline: none; }
  .date-inputs input:focus { border-color: #52c41a; }
  .fetch-btn { padding: 7px 18px; background: #52c41a; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .fetch-btn:hover { background: #389e0d; }
  .fetch-btn:disabled { background: #aaa; cursor: not-allowed; }
  .status-text { font-size: 12px; color: #888; }
  .status-text.ok { color: #52c41a; }
  .status-text.err { color: #f5222d; }

  /* Tabs */
  .tabs { background: white; border-bottom: 1px solid #e4e6ea; padding: 0 24px; display: flex; gap: 0; }
  .tab-btn { padding: 13px 20px; font-size: 14px; font-weight: 500; color: #888; border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.15s; }
  .tab-btn:hover { color: #52c41a; }
  .tab-btn.active { color: #52c41a; border-bottom-color: #52c41a; font-weight: 600; }

  .main { padding: 20px 24px; max-width: 1500px; margin: 0 auto; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.75); z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
  .loading-overlay.show { display: flex; }
  .spinner { width: 40px; height: 40px; border: 4px solid #e4e6ea; border-top-color: #52c41a; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Summary cards */
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .sc { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .sc .lbl { font-size: 11px; color: #65676b; font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
  .sc .val { font-size: 22px; font-weight: 700; }
  .sc .sub { font-size: 11px; color: #999; margin-top: 3px; }
  .c-green .val { color: #52c41a; }
  .c-blue .val { color: #1877f2; }
  .c-orange .val { color: #fa8c16; }
  .c-purple .val { color: #722ed1; }
  .c-teal .val { color: #13c2c2; }
  .c-pink .val { color: #eb2f96; }

  /* Charts */
  .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 20px; }
  .chart-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .chart-card h3 { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 14px; }
  .chart-wrap { position: relative; height: 220px; }

  /* Tables */
  .table-card { background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); overflow: hidden; margin-bottom: 20px; }
  .table-header { padding: 14px 20px; border-bottom: 1px solid #f0f2f5; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .table-header h3 { font-size: 15px; font-weight: 600; }
  .table-header-right { display: flex; align-items: center; gap: 10px; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #f7f8fa; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: #65676b; padding: 10px 14px; text-align: right; white-space: nowrap; border-bottom: 1px solid #e4e6ea; cursor: pointer; user-select: none; }
  th:first-child { text-align: left; cursor: default; }
  th.sortable:hover { color: #52c41a; background: #f0fff0; }
  th.sort-asc::after { content: ' ↑'; }
  th.sort-desc::after { content: ' ↓'; }
  td { padding: 10px 14px; text-align: right; border-bottom: 1px solid #f5f5f5; font-size: 13px; white-space: nowrap; }
  td:first-child { text-align: left; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f6ffed; }
  .na { color: #ccc; }
  .roas-high { color: #52c41a; font-weight: 700; }
  .roas-mid { color: #fa8c16; font-weight: 700; }
  .roas-low { color: #f5222d; font-weight: 700; }
  .spend-bar-wrap { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
  .spend-bar { height: 5px; border-radius: 3px; background: #52c41a; opacity: 0.65; min-width: 2px; }
  .cell-name { font-weight: 600; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
  .cell-sub { font-size: 11px; color: #aaa; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }

  /* Filters */
  .filter-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .filter-select { padding: 5px 10px; border: 1.5px solid #e4e6ea; border-radius: 8px; font-size: 12px; outline: none; color: #333; }
  .filter-select:focus { border-color: #52c41a; }
  .search-input { padding: 5px 12px; border: 1.5px solid #e4e6ea; border-radius: 8px; font-size: 12px; outline: none; width: 180px; }
  .search-input:focus { border-color: #52c41a; }
  .count-badge { font-size: 12px; color: #aaa; }

  /* Sticky first column */
  th:first-child, td:first-child {
    position: sticky; left: 0; z-index: 2;
    background: inherit;
  }
  th:first-child { background: #f7f8fa; z-index: 3; }
  td:first-child { background: white; }
  tr:hover td:first-child { background: #f6ffed; }

  /* Google Ads sub-tabs */
  .sub-tabs { display: flex; gap: 6px; padding: 16px 20px 0; border-bottom: 1px solid #f0f2f5; flex-wrap: wrap; }
  .sub-tab-btn { padding: 7px 16px; font-size: 13px; font-weight: 500; color: #888; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .sub-tab-btn:hover { color: #1677ff; }
  .sub-tab-btn.active { color: #1677ff; border-bottom-color: #1677ff; font-weight: 600; }
  .sub-tab-panel { display: none; }
  .sub-tab-panel.active { display: block; }
  .gads-badge { background: #e6f4ff; color: #1677ff; border-radius: 4px; font-size: 11px; padding: 2px 6px; margin-left: 6px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-badge">Verve_New</div>
    <div class="header-title">
      <h1>成效儀表板</h1>
      <p>帳戶 ID：1417409513448597 · TWD</p>
    </div>
  </div>
  <div class="header-right">
    <a class="back-link" href="index.html">← 回總覽</a><br>
    最後更新：<span id="lastUpdate">—</span>
  </div>
</div>

<div class="controls">
  <div class="preset-btns">
    <button class="preset-btn" onclick="applyPreset(1)">今天</button>
    <button class="preset-btn" onclick="applyPresetYesterday()">昨天</button>
    <button class="preset-btn active" onclick="applyPreset(7)">近7天</button>
    <button class="preset-btn" onclick="applyPreset(30)">近30天</button>
    <button class="preset-btn" onclick="applyPreset(90)">近90天</button>
    <button class="preset-btn" onclick="applyPresetMonth()">本月</button>
  </div>
  <div class="date-inputs">
    <input type="date" id="dateFrom" onchange="clearPreset()">
    <span style="color:#bbb">至</span>
    <input type="date" id="dateTo" onchange="clearPreset()">
  </div>
  <button class="fetch-btn" id="fetchBtn" data-manual="true" onclick="fetchData(true)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/></svg>
    更新資料
  </button>
  <span class="status-text" id="statusText"></span>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('overall')">🌐 媒體總成效</button>
  <button class="tab-btn" onclick="switchTab('perf')">📊 Meta 成效</button>
  <button class="tab-btn" onclick="switchTab('creative')">🎨 Meta 素材</button>
  <button class="tab-btn" onclick="switchTab('gads')">🔍 Google Ads</button>
  <button class="tab-btn" onclick="switchTab('gkw')">🔑 Google 關鍵字</button>
  <button class="tab-btn" onclick="switchTab('sholine')">🛍️ SHOPLINE</button>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <span style="color:#555;font-size:14px;">正在從 Meta API 抓取資料…</span>
</div>

<div class="main">
  <!-- 媒體總成效 tab -->
  <div class="tab-panel active" id="tab-overall">
    <div style="text-align:center;padding:60px;color:#aaa;">點擊「更新資料」開始載入</div>
  </div>

  <!-- 成效 tab -->
  <div class="tab-panel" id="tab-perf">
    <div style="text-align:center;padding:60px;color:#aaa;">點擊「更新資料」開始載入</div>
  </div>

  <!-- Google Ads tab -->
  <div class="tab-panel" id="tab-gads">
    <div style="text-align:center;padding:60px;color:#aaa;">點擊「更新資料」開始載入</div>
  </div>

  <!-- Google 關鍵字 tab -->
  <div class="tab-panel" id="tab-gkw">
    <div style="text-align:center;padding:60px;color:#aaa;">點擊「更新資料」開始載入</div>
  </div>

  <!-- SHOLINE tab -->
  <div class="tab-panel" id="tab-sholine">
    <div style="text-align:center;padding:60px;color:#aaa;">點擊「更新資料」開始載入</div>
  </div>

  <!-- 素材 tab -->
  <div class="tab-panel" id="tab-creative">
    <div style="text-align:center;padding:60px;color:#aaa;">點擊「更新資料」開始載入</div>
  </div>
</div>

<script>
const API_BASE = 'https://verve-dashboard.onrender.com';
const ACCOUNT_ID = '1417409513448597';
let trendChart, pieChart;
let overallSpendChart = null, overallPieChart = null;
let allAdData = [];
let adUrlMap = {};
let sortKey = '', sortDir = -1;

const SHOLINE_CSV = 'https://docs.google.com/spreadsheets/d/10XkXDRqrB2ywgx4hOeXsLSJ1fApUhyOyrghS9aRjt_Q/gviz/tq?tqx=out:csv&sheet=0';
const GADS_PUB = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_TDOx18DHGNE131D6nUo7tieM7u2ccG67D_UJ92fsc6A6rdcCkq_7_EaGgkUDaOtGoKO-9yGc_ZYW/pub';
const GADS_CSV = {
  daily:    `${GADS_PUB}?gid=1644261807&single=true&output=csv`,
  campaign: `${GADS_PUB}?gid=1433244860&single=true&output=csv`,
  age:      `${GADS_PUB}?gid=1627764612&single=true&output=csv`,
  gender:   `${GADS_PUB}?gid=1613742604&single=true&output=csv`,
  location: `${GADS_PUB}?gid=1732071302&single=true&output=csv`,
  adgroup:  `${GADS_PUB}?gid=363487600&single=true&output=csv`,
  keyword:  `${GADS_PUB}?gid=355190306&single=true&output=csv`,
};

// ── Date ──────────────────────────────────────────────────
function toYMD(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function clearPreset() {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
}
function applyPreset(days) {
  const to = new Date(), from = new Date();
  from.setDate(to.getDate() - days + 1);
  document.getElementById('dateFrom').value = toYMD(from);
  document.getElementById('dateTo').value = toYMD(to);
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}
function applyPresetYesterday() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  document.getElementById('dateFrom').value = toYMD(d);
  document.getElementById('dateTo').value = toYMD(d);
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}
function applyPresetMonth() {
  const now = new Date();
  document.getElementById('dateFrom').value = toYMD(new Date(now.getFullYear(), now.getMonth(), 1));
  document.getElementById('dateTo').value = toYMD(now);
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}
(function() {
  const to = new Date(), from = new Date();
  from.setDate(to.getDate() - 6);
  document.getElementById('dateFrom').value = toYMD(from);
  document.getElementById('dateTo').value = toYMD(to);
})();

// ── Tabs ──────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// ── Fetch ─────────────────────────────────────────────────
async function fetchData(forceRefresh = false) {
  const since = document.getElementById('dateFrom').value;
  const until = document.getElementById('dateTo').value;
  const btn = document.getElementById('fetchBtn');
  const status = document.getElementById('statusText');
  btn.disabled = true;
  document.getElementById('loadingOverlay').classList.add('show');
  status.textContent = '載入中…'; status.className = 'status-text';

  const force = forceRefresh;

  try {
    const [campRes, trendRes, adRes, urlRes, ageRes, genderRes,
           gDailyRes, gCampRes, gAgeRes, gGenderRes, gLocRes, gAgRes, gKwRes, sholineRes] = await Promise.all([
      fetch(`${API_BASE}/api/insights?accounts=${ACCOUNT_ID}&since=${since}&until=${until}&level=campaign${force?'&force=true':''}`),
      fetch(`${API_BASE}/api/insights?accounts=${ACCOUNT_ID}&since=${since}&until=${until}&level=account&time_increment=1${force?'&force=true':''}`),
      fetch(`${API_BASE}/api/insights?accounts=${ACCOUNT_ID}&since=${since}&until=${until}&level=ad${force?'&force=true':''}`),
      fetch(`${API_BASE}/api/ad_urls?account=${ACCOUNT_ID}`),
      fetch(`${API_BASE}/api/insights?accounts=${ACCOUNT_ID}&since=${since}&until=${until}&level=account&breakdowns=age`),
      fetch(`${API_BASE}/api/insights?accounts=${ACCOUNT_ID}&since=${since}&until=${until}&level=account&breakdowns=gender`),
      fetch(GADS_CSV.daily),
      fetch(GADS_CSV.campaign),
      fetch(GADS_CSV.age),
      fetch(GADS_CSV.gender),
      fetch(GADS_CSV.location),
      fetch(GADS_CSV.adgroup),
      fetch(GADS_CSV.keyword),
      fetch(SHOLINE_CSV),
    ]);
    const campJson  = await campRes.json();
    const trendJson = await trendRes.json();
    const adJson    = await adRes.json();
    const ageJson   = await ageRes.json();
    const genderJson= await genderRes.json();
    const campData  = campJson.data || [];
    const trendData = trendJson.data || [];
    allAdData       = adJson.data || [];
    adUrlMap        = (await urlRes.json()).data || {};

    const gDaily  = parseCSV(await gDailyRes.text());
    const gCamp   = parseCSV(await gCampRes.text());
    const gAge    = parseCSV(await gAgeRes.text());
    const gGender = parseCSV(await gGenderRes.text());
    const gLoc    = parseCSV(await gLocRes.text());
    const gAg     = parseCSV(await gAgRes.text());
    const gKw       = parseCSV(await gKwRes.text());
    const sholineRaw = parseCSV(await sholineRes.text());

    renderOverall(trendData, gDaily, since, until, ageJson.data||[], genderJson.data||[], gAge, gGender);
    renderSholine(sholineRaw, since, until, trendData, gDaily);
    renderPerf(campData, trendData, since, until);
    renderCreative();
    renderDemographic(ageJson.data || [], genderJson.data || []);
    renderGoogleAds({ daily: gDaily, campaign: gCamp, age: gAge, gender: gGender, location: gLoc, adgroup: gAg, keyword: gKw }, since, until);
    const kwRows = aggRows(filterByDate(gKw, since, until), ['關鍵字']).map(r => {
      const ctr  = r.imp > 0 ? r.clk/r.imp*100 : 0;
      const cpa  = r.purchase > 0 ? r.spend/r.purchase : 0;
      const roas = r.spend > 0 ? r.revenue/r.spend : 0;
      return { ...r._keys, spend:r.spend, imp:r.imp, clk:r.clk, ctr, purchase:r.purchase, revenue:r.revenue, cpa, roas };
    });
    renderGoogleKeyword(kwRows);
    const updatedAt = campJson.updated || new Date().toLocaleString('zh-TW');
    const isCached  = campJson.cached;
    document.getElementById('lastUpdate').textContent = updatedAt + (isCached ? '（快取）' : '');
    status.textContent = `✓ 完成・${campData.length} campaigns・${allAdData.length} 素材`;
    status.className = 'status-text ok';
  } catch(e) {
    status.textContent = `❌ ${e.message}`; status.className = 'status-text err';
  } finally {
    btn.disabled = false;
    document.getElementById('loadingOverlay').classList.remove('show');
  }
}

const PIE_COLORS = ['#4f8ef7','#f7954f','#52c41a','#f74f7e','#a855f7','#14b8a6','#f59e0b','#aaa'];

// ── Formatters ────────────────────────────────────────────
function fmtN(n, d=0) { if (n == null || isNaN(n)) return '<span class="na">—</span>'; return (+n).toLocaleString('zh-TW',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmtM(n) { if (!n && n !== 0) return '<span class="na">—</span>'; return 'NT$'+Math.round(n).toLocaleString('zh-TW'); }
function fmtP(n) { if (n == null) return '<span class="na">—</span>'; return (+n).toFixed(2)+'%'; }
function rc(r) { return r >= 10 ? 'roas-high' : r >= 3 ? 'roas-mid' : 'roas-low'; }

// ── Perf Tab ──────────────────────────────────────────────
function renderPerf(camps, trend, since, until) {
  const total = camps.reduce((a,r) => ({
    spend: a.spend+(r.spend||0), impressions: a.impressions+(r.impressions||0),
    link_clicks: a.link_clicks+(r.link_clicks||0), add_to_cart: a.add_to_cart+(r.add_to_cart||0),
    purchase: a.purchase+(r.purchase||0), purchase_value: a.purchase_value+(r.purchase_value||0),
  }), {spend:0,impressions:0,link_clicks:0,add_to_cart:0,purchase:0,purchase_value:0});
  const roas = total.spend > 0 ? total.purchase_value/total.spend : 0;
  const cpa = total.purchase > 0 ? total.spend/total.purchase : 0;
  const sorted = [...camps].sort((a,b)=>(b.spend||0)-(a.spend||0));
  const maxSpend = sorted[0]?.spend || 1;

  document.getElementById('tab-perf').innerHTML = `
    <div class="summary-grid">
      <div class="sc c-blue"><div class="lbl">花費</div><div class="val">${fmtM(total.spend)}</div><div class="sub">${since} ～ ${until}</div></div>
      <div class="sc"><div class="lbl">曝光</div><div class="val">${(total.impressions/10000).toFixed(1)}萬</div><div class="sub">${total.impressions.toLocaleString()}</div></div>
      <div class="sc c-purple"><div class="lbl">連結點擊</div><div class="val">${total.link_clicks.toLocaleString()}</div><div class="sub">Link Clicks</div></div>
      <div class="sc c-orange"><div class="lbl">加入購物車</div><div class="val">${Math.round(total.add_to_cart).toLocaleString()}</div><div class="sub">Add to Cart</div></div>
      <div class="sc c-teal"><div class="lbl">購買</div><div class="val">${Math.round(total.purchase).toLocaleString()}</div><div class="sub">Purchase</div></div>
      <div class="sc c-pink"><div class="lbl">轉換值</div><div class="val">${fmtM(total.purchase_value)}</div><div class="sub">Purchase Value</div></div>
      <div class="sc c-green"><div class="lbl">ROAS</div><div class="val">${roas.toFixed(2)}x</div><div class="sub">轉換值 / 花費</div></div>
      <div class="sc"><div class="lbl">CPA（購買）</div><div class="val">${fmtM(cpa)}</div><div class="sub">Cost per Purchase</div></div>
    </div>
    <div class="charts-row">
      <div class="chart-card">

function groupByName(rows) {
  const map = {};
  for (const r of rows) {
    const key = r.ad_name || '—';
    if (!map[key]) {
      map[key] = { ad_name: key, spend: 0, impressions: 0, link_clicks: 0, add_to_cart: 0, purchase: 0, purchase_value: 0 };
    }
    const g = map[key];
    g.spend         += r.spend         || 0;
    g.impressions   += r.impressions   || 0;
    g.link_clicks   += r.link_clicks   || 0;
    g.add_to_cart   += r.add_to_cart   || 0;
    g.purchase      += r.purchase      || 0;
    g.purchase_value+= r.purchase_value|| 0;
  }
  return Object.values(map).map(g => ({
    ...g,
    ctr:  g.impressions > 0 ? g.link_clicks / g.impressions * 100 : 0,
    cplc: g.link_clicks > 0 ? g.spend / g.link_clicks : 0,
    roas: g.spend > 0 ? g.purchase_value / g.spend : 0,
    cpa:  g.purchase > 0 ? g.spend / g.purchase : 0,
  }));
}

}

// ── CSV parser ────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i]||'').replace(/^"|"$/g,''));
    return obj;
  });
}

function filterByDate(rows, since, until) {
  return rows.filter(r => {
    const d = r['日期'] || r['date'] || '';
    return d >= since && d <= until;
  });
}

function aggRows(rows, dimKeys) {
  const map = {};
  rows.forEach(r => {
    const key = dimKeys.map(k => r[k]||'').join('||');
    if (!map[key]) {
      map[key] = { _keys: {}, spend:0, imp:0, clk:0, purchase:0, revenue:0 };
      dimKeys.forEach(k => map[key]._keys[k] = r[k]||'');
    }
    map[key].spend    += parseFloat(r['花費(TWD)'])||0;
    map[key].imp      += parseInt(r['曝光'])||0;
    map[key].clk      += parseInt(r['點擊'])||0;
    map[key].purchase += parseFloat(r['購買'])||0;
    map[key].revenue  += parseFloat(r['營收(TWD)'])||0;
  });
  return Object.values(map).sort((a,b) => b.spend - a.spend);
}

function gadsTable(rows, cols) {
  if (!rows.length) return '<div style="padding:20px;color:#aaa">無資料</div>';
  const maxSpend = Math.max(...rows.map(r=>r.spend||0), 1);
  return `<div class="table-wrap"><table>
    <thead><tr>${cols.map(c=>`<th>${c.label}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r=>{
      const bw = Math.round((r.spend||0)/maxSpend*60);
      return `<tr>${cols.map(c => {
        if (c.key === 'spend') return `<td><div class="spend-bar-wrap">${fmtM(r.spend)}<div class="spend-bar" style="width:${bw}px"></div></div></td>`;
        if (c.fmt === 'M') return `<td>${fmtM(r[c.key]||0)}</td>`;
        if (c.fmt === 'N') return `<td>${fmtN(r[c.key]||0)}</td>`;
        if (c.fmt === 'P') return `<td>${fmtP(r[c.key]||0)}</td>`;
        if (c.fmt === 'R') return `<td class="${rc(r[c.key]||0)}">${(r[c.key]||0)?((+r[c.key]).toFixed(2)+'x'):'<span class="na">—</span>'}</td>`;
        return `<td>${r[c.key]||'—'}</td>`;
      }).join('')}</tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

function renderOverall(trendData, gDaily, since, until, metaAgeData, metaGenderData, gAge, gGender) {

  }), {spend:0,imp:0,clk:0,purchase:0,revenue:0});
  meta.roas = meta.spend > 0 ? meta.revenue/meta.spend : 0;

      }

      scales: {
        x:  { grid:{display:false}, ticks:{font:{size:10},maxTicksLimit:10} },
        y:  { position:'left',  beginAtZero:true, grid:{color:'#f0f2f5'}, ticks:{callback:v=>'NT$'+Math.round(v/1000)+'K',font:{size:10}} },
        y2: { position:'right', beginAtZero:true, grid:{display:false}, ticks:{callback:v=>v+'x',font:{size:10}} },
        y3: { display:false, beginAtZero:true },

  // 廣告群組圓餅圖
  if (gadsPieChart) gadsPieChart.destroy();

    const ageTotalSpend = ageRows.reduce((s,r)=>s+r.spend, 0);
    el.insertAdjacentHTML('beforeend', `
      <div class="table-card" style="margin-top:20px">
        <div class="table-header"><h3>👥 年齡分析</h3></div>
        <div style="display:flex;gap:24px;padding:20px;align-items:center">
          <div style="flex:2;min-width:0">
            <div style="position:relative;height:240px"><canvas id="gadsAgePieChart"></canvas></div>
            <div id="gadsAgePieChart-legend" style="display:flex;flex-wrap:wrap;padding:10px 4px;font-size:11px;color:#555"></div>
          </div>
          <div style="flex:3;min-width:0;position:relative;height:320px"><canvas id="gadsAgeBarChart"></canvas></div>
        </div>
        ${gadsTable(ageRows, [{label:'年齡層',key:'年齡層'},...metricCols])}
      </div>`);
    new Chart(document.getElementById('gadsAgePieChart'), {
      type:'doughnut', data:{ labels:ageRows.map(r=>r['年齡層']), datasets:[{data:ageRows.map(r=>r.spend), backgroundColor:ageColors, borderWidth:2, borderColor:'#fff'}] },
      options:{ responsive:true, maintainAspectRatio:false, cutout:'60%', plugins:{ title:{display:true,text:'花費分佈（年齡）',font:{size:13,weight:'bold'},padding:{bottom:8}}, legend:{display:false}, tooltip:{callbacks:{label:ctx=>` ${fmtM(ctx.parsed)} (${ageTotalSpend?(ctx.parsed/ageTotalSpend*100).toFixed(1):0}%)`}} } }
    });
    document.getElementById('gadsAgePieChart-legend').innerHTML = ageRows.map((r,i) => {
      const pct = ageTotalSpend ? (r.spend/ageTotalSpend*100).toFixed(1) : '0';
      return `<div style="width:50%;display:flex;align-items:center;gap:5px;padding:2px 4px 2px 0;box-sizing:border-box;white-space:nowrap"><span style="display:inline-block;width:11px;height:11px;border-radius:2px;background:${ageColors[i]};flex-shrink:0"></span><span>${r['年齡層']} ${pct}%</span></div>`;
    }).join('');
    new Chart(document.getElementById('gadsAgeBarChart'), {
      data:{ labels:ageBarRows.map(r=>r['年齡層']), datasets:[
        {type:'bar',label:'花費',data:ageBarRows.map(r=>r.spend),backgroundColor:'#a8c8f8',borderColor:'#7aaee8',borderWidth:1,yAxisID:'y',borderRadius:4,order:2},
        {type:'line',label:'ROAS',data:ageBarRows.map(r=>r.roas),borderColor:'#e8833a',backgroundColor:'transparent',borderWidth:2.5,pointStyle:'circle',pointRadius:4,pointBackgroundColor:'#fff',pointBorderColor:'#e8833a',pointBorderWidth:2,tension:0.3,yAxisID:'y2',order:1}
      ]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{title:{display:true,text:'花費 / ROAS（年齡）',font:{size:13,weight:'bold'},padding:{bottom:8}},legend:{position:'top',labels:{font:{size:11},boxWidth:14,padding:12}}}, scales:{x:{grid:{display:false}},y:{position:'left',title:{display:true,text:'花費',font:{size:11}},grid:{color:'#f0f0f0'}},y2:{position:'right',title:{display:true,text:'ROAS',font:{size:11}},grid:{drawOnChartArea:false}}} }
    });
  }

  if (genderRows.length) {
    const gColors = genderRows.map(r=>r['性別']==='女性'?'#f74f7e':r['性別']==='男性'?'#4285f4':'#aaa');
    const gTotalSpend = genderRows.reduce((s,r)=>s+r.spend, 0);
    el.insertAdjacentHTML('beforeend', `
      <div class="table-card" style="margin-top:20px">
        <div class="table-header"><h3>⚧ 性別分析</h3></div>
        <div style="display:flex;gap:24px;padding:20px;align-items:center">
          <div style="flex:2;min-width:0">
            <div style="position:relative;height:240px"><canvas id="gadsGenderPieChart"></canvas></div>
            <div id="gadsGenderPieChart-legend" style="display:flex;flex-wrap:wrap;padding:10px 4px;font-size:11px;color:#555"></div>
          </div>
          <div style="flex:3;min-width:0;position:relative;height:320px"><canvas id="gadsGenderBarChart"></canvas></div>
        </div>
        ${gadsTable(genderRows, [{label:'性別',key:'性別'},...metricCols])}
      </div>`);
    new Chart(document.getElementById('gadsGenderPieChart'), {
      type:'doughnut', data:{ labels:genderRows.map(r=>r['性別']), datasets:[{data:genderRows.map(r=>r.spend), backgroundColor:gColors, borderWidth:2, borderColor:'#fff'}] },
      options:{ responsive:true, maintainAspectRatio:false, cutout:'60%', plugins:{ title:{display:true,text:'花費分佈（性別）',font:{size:13,weight:'bold'},padding:{bottom:8}}, legend:{display:false}, tooltip:{callbacks:{label:ctx=>` ${fmtM(ctx.parsed)} (${gTotalSpend?(ctx.parsed/gTotalSpend*100).toFixed(1):0}%)`}} } }
    });
    document.getElementById('gadsGenderPieChart-legend').innerHTML = genderRows.map((r,i) => {
      const pct = gTotalSpend ? (r.spend/gTotalSpend*100).toFixed(1) : '0';
      return `<div style="width:50%;display:flex;align-items:center;gap:5px;padding:2px 4px 2px 0;box-sizing:border-box;white-space:nowrap"><span style="display:inline-block;width:11px;height:11px;border-radius:2px;background:${gColors[i]};flex-shrink:0"></span><span>${r['性別']} ${pct}%</span></div>`;
    }).join('');
    new Chart(document.getElementById('gadsGenderBarChart'), {
      data:{ labels:genderRows.map(r=>r['性別']), datasets:[
        {type:'bar',label:'花費',data:genderRows.map(r=>r.spend),backgroundColor:gColors.map(c=>c+'88'),borderColor:gColors,borderWidth:1,yAxisID:'y',borderRadius:4,order:2},
        {type:'line',label:'ROAS',data:genderRows.map(r=>r.roas),borderColor:'#e8833a',backgroundColor:'transparent',borderWidth:2.5,pointStyle:'circle',pointRadius:4,pointBackgroundColor:'#fff',pointBorderColor:'#e8833a',pointBorderWidth:2,tension:0.3,yAxisID:'y2',order:1}
      ]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{title:{display:true,text:'花費 / ROAS（性別）',font:{size:13,weight:'bold'},padding:{bottom:8}},legend:{position:'top',labels:{font:{size:11},boxWidth:14,padding:12}}}, scales:{x:{grid:{display:false}},y:{position:'left',title:{display:true,text:'花費',font:{size:11}},grid:{color:'#f0f0f0'}},y2:{position:'right',title:{display:true,text:'ROAS',font:{size:11}},grid:{drawOnChartArea:false}}} }
    });
  }
}

function renderGoogleKeyword(kwRows) {
  const el = document.getElementById('tab-gkw');
  const cols = [
    { label:'關鍵字', key:'關鍵字' },
    { label:'花費', key:'spend' },
    { label:'曝光', key:'imp', fmt:'N' },
    { label:'點擊', key:'clk', fmt:'N' },
    { label:'CTR', key:'ctr', fmt:'P' },
    { label:'購買', key:'purchase', fmt:'N' },
    { label:'營收', key:'revenue', fmt:'M' },
    { label:'CPA', key:'cpa', fmt:'M' },
    { label:'ROAS', key:'roas', fmt:'R' },
  ];
  const top10 = kwRows.slice(0, 10);
  const rest  = kwRows.slice(10);
  const maxSpend = kwRows[0]?.spend || 1;

  function rowsHTML(rows) {
    return rows.map(r => `<tr>${cols.map(c => {
      if (c.key === 'spend') return `<td><div class="spend-bar-wrap">${fmtM(r.spend)}<div class="spend-bar" style="width:${Math.round(r.spend/maxSpend*60)}px"></div></div></td>`;
      if (c.fmt === 'M') return `<td>${fmtM(r[c.key]||0)}</td>`;
      if (c.fmt === 'N') return `<td>${fmtN(r[c.key]||0)}</td>`;
      if (c.fmt === 'P') return `<td>${fmtP(r[c.key]||0)}</td>`;
      if (c.fmt === 'R') return `<td class="${rc(r[c.key]||0)}">${(r[c.key]||0)?((+r[c.key]).toFixed(2)+'x'):'<span class="na">—</span>'}</td>`;
      return `<td>${r[c.key]||'—'}</td>`;
    }).join('')}</tr>`).join('');
  }

  el.innerHTML = `
    <div style="padding:20px">
      <div class="table-card">
        <div class="table-header">
          <h3>🔑 關鍵字成效</h3>
          <span style="font-size:12px;color:#aaa;">${kwRows.length} 組關鍵字</span>
        </div>
        <div class="table-wrap" style="max-height:520px;overflow-y:auto">
          <table>
            <thead><tr>${cols.map(c=>`<th>${c.label}</th>`).join('')}</tr></thead>
            <tbody>${rowsHTML(top10)}${rest.length ? rowsHTML(rest) : ''}</tbody>
          </table>
        </div>
      </div>
    </div>`;
}

let sholineTrendChart = null;
function renderSholine(rows, since, until, trendData, gDaily) {
  const norm = d => { const p=d.split('/'); return `${p[0]}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`; };
  const filtered = rows
    .filter(r => r['日期'] && norm(r['日期']) >= since && norm(r['日期']) <= until)
    .map(r => ({
      date:     norm(r['日期']),
      revenue:  parseFloat(r['網店成交額']?.replace(/,/g,''))||0,
      orders:   parseInt(r['網店成交-訂單數']?.replace(/,/g,''))||0,
      sessions: parseInt(r['總工作階段數']?.replace(/,/g,''))||0,
      cvr:      parseFloat(r['轉換率'])||0,
    }))
    .sort((a,b) => a.date > b.date ? 1 : -1);

  // 每日廣告花費 & 廣告營收 (Meta + Google)
  const norm2 = d => { const p=d.split('/'); return `${p[0]}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`; };
  const metaMap = {};
  (trendData||[]).forEach(r => { if (r.date_start) metaMap[r.date_start] = { spend: r.spend||0, rev: r.purchase_value||0 }; });
  const gMap = {};
  (gDaily||[]).forEach(r => { if (r['日期']) {
    const d = r['日期'].includes('-') ? r['日期'] : norm2(r['日期']);
    if (!gMap[d]) gMap[d] = {spend:0, rev:0};
    gMap[d].spend += parseFloat(r['花費(TWD)'])||0;
    gMap[d].rev   += parseFloat(r['營收(TWD)'])||0;
  }});
  filtered.forEach(r => {
    r.adSpend  = (metaMap[r.date]?.spend||0) + (gMap[r.date]?.spend||0);
    r.adRev    = (metaMap[r.date]?.rev||0)   + (gMap[r.date]?.rev||0);
    r.siteRoas = r.adSpend > 0 ? r.revenue/r.adSpend : 0;
  });

  const total = filtered.reduce((a,r) => ({
    revenue: a.revenue+r.revenue, orders: a.orders+r.orders,
    sessions: a.sessions+r.sessions, adSpend: a.adSpend+r.adSpend,
  }), {revenue:0, orders:0, sessions:0, adSpend:0});
  const aov = total.orders > 0 ? total.revenue/total.orders : 0;

  document.getElementById('tab-sholine').innerHTML = `
    <div class="summary-grid">
      <div class="sc c-blue"><div class="lbl">成交額</div><div class="val">${fmtM(total.revenue)}</div><div class="sub">${since} ～ ${until}</div></div>
      <div class="sc c-purple"><div class="lbl">成交訂單數</div><div class="val">${total.orders.toLocaleString()}</div><div class="sub">Orders</div></div>
      <div class="sc"><div class="lbl">工作階段</div><div class="val">${total.sessions.toLocaleString()}</div><div class="sub">Sessions</div></div>
      <div class="sc c-orange"><div class="lbl">平均客單價</div><div class="val">${fmtM(aov)}</div><div class="sub">成交額 / 成交訂單</div></div>
      <div class="sc c-blue"><div class="lbl">廣告花費</div><div class="val">${fmtM(total.adSpend)}</div><div class="sub">Meta + Google</div></div>
      <div class="sc c-green"><div class="lbl">全站 ROAS</div><div class="val">${total.adSpend>0?(total.revenue/total.adSpend).toFixed(2)+'x':'—'}</div><div class="sub">成交額 / 廣告花費</div></div>
    </div>
    <div class="chart-card" style="margin-bottom:20px">
      <h3>📅 每日趨勢</h3>
      <div style="position:relative;height:280px"><canvas id="sholineTrendChart"></canvas></div>
    </div>
    <div class="table-card">
      <div class="table-header"><h3>📋 每日明細</h3></div>
      <div class="table-wrap"><table>
        <thead><tr>
          <th>日期</th><th>成交額</th><th>成交訂單</th><th>工作階段</th><th>轉換率</th><th>平均客單價</th><th style="color:#8B5E3C">廣告花費</th><th style="color:#8B5E3C">全站ROAS</th>
        </tr></thead>
        <tbody>${filtered.map(r => {
          const aov = r.orders > 0 ? r.revenue/r.orders : 0;
          return `<tr>
            <td>${r.date}</td>
            <td>${fmtM(r.revenue)}</td><td>${r.orders.toLocaleString()}</td>
            <td>${r.sessions.toLocaleString()}</td><td>${(r.cvr*100).toFixed(2)}%</td>
            <td>${fmtM(aov)}</td>
            <td style="color:#8B5E3C;font-weight:400">${fmtM(r.adSpend)}</td>
            <td style="color:#8B5E3C;font-weight:400">${r.siteRoas?r.siteRoas.toFixed(2)+'x':'<span class="na">—</span>'}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`;

  if (sholineTrendChart) sholineTrendChart.destroy();
  sholineTrendChart = new Chart(document.getElementById('sholineTrendChart'), {
    data: { labels: filtered.map(r=>r.date), datasets: [
      { type:'bar',  label:'成交額',   data: filtered.map(r=>r.revenue), backgroundColor:'rgba(100,210,230,0.6)', borderColor:'#38bcd8', borderWidth:1, borderRadius:3, yAxisID:'y', order:3 },
      { type:'bar',  label:'廣告營收', data: filtered.map(r=>r.adRev),   backgroundColor:'rgba(110,130,220,0.55)', borderColor:'#6b7fd6', borderWidth:1, borderRadius:3, yAxisID:'y', order:2 },
      { type:'line', label:'全站ROAS', data: filtered.map(r=>r.siteRoas), borderColor:'#e8833a', backgroundColor:'transparent', borderWidth:2.5, pointRadius:3, tension:0.3, yAxisID:'y2', order:1 },
    ]},
    options: { responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
      plugins:{ legend:{position:'top',labels:{font:{size:11},boxWidth:12,padding:12}} },
      scales: {
        x:  { grid:{display:false}, ticks:{font:{size:10},maxTicksLimit:14} },
        y:  { position:'left',  beginAtZero:true, grid:{color:'#f0f2f5'}, ticks:{callback:v=>'NT$'+Math.round(v/1000)+'K',font:{size:10}} },
        y2: { position:'right', beginAtZero:true, grid:{display:false}, ticks:{callback:v=>v.toFixed(1)+'x',font:{size:10}} },
      }
    }
  });
}

fetchData();
</script>
